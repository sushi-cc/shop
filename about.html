<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="cdn" rel="icon" href="https://i.postimg.cc/v8z6rRVj/S-443310086.jpg">
    <title>生鮮團購｜職人嚴選</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f5f2; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { 
            background-color: #D4AF37 !important; 
            color: #1a3a5a !important;            
            font-weight: bold;
            border-radius: 9999px;                
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 移除 item-card 的 transition 動畫，避免顏色切換時產生延遲過渡 */
        .item-card { transition: none; }
    </style>
    <div id="cart-footer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-md bg-[#1a3a5a] text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between border border-white/10 hidden fade-in">
        <div onclick="toggleCartModal()" class="flex items-center space-x-3 cursor-pointer hover:opacity-80 transition-opacity">
            <div class="relative">
                <i class="fas fa-shopping-basket text-2xl text-[#D4AF37]"></i>
                <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1a3a5a]">0</span>
            </div>
            <div>
                <p class="text-[10px] opacity-60">目前預算累計 (點擊查看)</p>
                <p class="text-lg font-black">$ <span id="cart-total">0</span></p>
            </div>
        </div>
        <button onclick="toggleCartModal()" class="bg-[#D4AF37] text-[#1a3a5a] px-6 py-2 rounded-xl font-bold flex items-center space-x-2 transition-all active:scale-95">
            <i class="fas fa-list-ul mr-1"></i>
            <span>查看清單</span>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 z-[70] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleCartModal()"></div>
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white rounded-t-3xl p-6 shadow-2xl transition-transform duration-300">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-[#1a3a5a]">確認訂購內容</h3>
                <button onclick="toggleCartModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="cart-items-list" class="max-h-[60vh] overflow-y-auto space-y-4 mb-6 no-scrollbar"></div>
            <div class="border-t border-gray-100 pt-4 mb-6">
                <div class="flex justify-between items-center">
                    <span class="text-gray-500 text-sm">總計金額</span>
                    <span class="text-2xl font-black text-[#1a3a5a]">$ <span id="modal-total">0</span></span>
                </div>
            </div>
            <button onclick="sendToLine()" class="w-full bg-[#06C755] text-white py-4 rounded-2xl font-bold flex items-center justify-center space-x-2 shadow-lg active:scale-95 transition-all">
                <i class="fab fa-line text-2xl"></i>
                <span>確認訂單並發送</span>
            </button>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTITgLIl15r_SWgqFL4DihsAMIsMqOrZZD6l6GLgXC9orSXQEm-Dh5kHlp1Ee8ZA6FHlMUA1HCUjGII/pub?output=csv";
        let cart = [];
        let globalProducts = []; // 新增：用於快取商品資料

        async function fetchProducts() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                globalProducts = rows.filter(row => row.trim() !== '').map((row, index) => {
                    const cols = row.split(',');
                    return {
                        id: index,
                        name: cols[0] ? cols[0].trim() : "未命名",
                        price: cols[1] ? parseInt(cols[1]) : 0,
                        img: cols[2] ? cols[2].trim() : "",
                        spec: cols[3] ? cols[3].trim() : "",
                        about: cols[4] ? cols[4].trim() : ""
                    };
                });
                renderProducts(); // 呼叫時不再需要傳入參數，直接使用 globalProducts
            } catch (error) {
                console.error("資料讀取失敗:", error);
            }
        }

        function renderProducts() {
            const listContainer = document.getElementById('product-list');
            listContainer.innerHTML = ''; 

            globalProducts.forEach(p => {
                const cartItem = cart.find(item => item.name === p.name);
                const quantity = cartItem ? cartItem.quantity : 0;
                const activeClass = quantity > 0 ? "ring-2 ring-[#D4AF37] bg-amber-50" : "bg-white shadow-sm";

                // 移除 transition-all 以及圖片 hover 放大的過渡效果，僅保留按鈕 active 回饋
                listContainer.innerHTML += `
                    <div class="item-card group rounded-2xl p-3 ${activeClass} flex flex-col h-full">
                        <div class="relative overflow-hidden rounded-2xl aspect-square mb-3">
                            <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=圖片載入中'">
                            <div class="absolute top-3 right-3 backdrop-blur-md bg-white/90 text-[#1a3a5a] px-3 py-1.5 rounded-xl shadow-sm ring-1 ring-black/5">
                                <div class="text-sm font-black leading-none">$${p.price}</div>
                            </div>
                        </div>
                        <h3 class="text-base font-bold text-center text-[#1a3a5a] tracking-wide truncate">${p.name}</h3>
                        <p class="text-[11px] text-gray-500 text-center mt-1 font-medium truncate">${p.spec}</p>
                        <div class="mt-2 mb-auto px-1">
                            <p class="text-[10px] text-gray-400 text-center leading-relaxed line-clamp-2 italic">
                                ${p.about ? '「' + p.about + '」' : ''}
                            </p>
                        </div>
                        <div class="mt-4 flex items-center justify-between bg-gray-100 rounded-xl p-1">
                            <button onclick="updateQuantity('${p.name}', ${p.price}, -1)" 
                                    class="w-8 h-8 flex items-center justify-center bg-white rounded-lg shadow-sm active:scale-90 transition-transform">
                                <i class="fas fa-minus text-xs text-gray-400"></i>
                            </button>
                            <span class="font-bold text-[#1a3a5a] text-sm">${quantity}</span>
                            <button onclick="updateQuantity('${p.name}', ${p.price}, 1)" 
                                    class="w-8 h-8 flex items-center justify-center bg-[#1a3a5a] text-white rounded-lg shadow-sm active:scale-90 transition-transform">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function updateQuantity(name, price, delta) {
            const index = cart.findIndex(item => item.name === name);
            if (index > -1) {
                cart[index].quantity += delta;
                if (cart[index].quantity <= 0) cart.splice(index, 1);
            } else if (delta > 0) {
                cart.push({ name, price, quantity: 1 });
            }
            updateCartUI();
            renderProducts(); // 關鍵修改：不再呼叫 fetchProducts()，改為直接重新渲染快取的商品資料
        }
        

        function renderProducts(productList) {
            const listContainer = document.getElementById('product-list');
            listContainer.innerHTML = ''; 

            productList.forEach(p => {
                const cartItem = cart.find(item => item.name === p.name);
                const quantity = cartItem ? cartItem.quantity : 0;
                const activeClass = quantity > 0 ? "ring-2 ring-[#D4AF37] bg-amber-50" : "bg-white shadow-sm";

                // 移除 transition-all 以及圖片 hover 放大的過渡動畫，點擊按鈕 active:scale-90 的按壓感依然保留
                listContainer.innerHTML += `
                    <div class="item-card group rounded-2xl p-3 ${activeClass} flex flex-col h-full">
                        <div class="relative overflow-hidden rounded-2xl aspect-square mb-3">
                            <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=圖片載入中'">
                            <div class="absolute top-3 right-3 backdrop-blur-md bg-white/90 text-[#1a3a5a] px-3 py-1.5 rounded-xl shadow-sm ring-1 ring-black/5">
                                <div class="text-sm font-black leading-none">$${p.price}</div>
                            </div>
                        </div>
                        <h3 class="text-base font-bold text-center text-[#1a3a5a] tracking-wide truncate">${p.name}</h3>
                        <p class="text-[11px] text-gray-500 text-center mt-1 font-medium truncate">${p.spec}</p>
                        <div class="mt-2 mb-auto px-1">
                            <p class="text-[10px] text-gray-400 text-center leading-relaxed line-clamp-2 italic">
                                ${p.about ? '「' + p.about + '」' : ''}
                            </p>
                        </div>
                        <div class="mt-4 flex items-center justify-between bg-gray-100 rounded-xl p-1">
                            <button onclick="updateQuantity('${p.name}', ${p.price}, -1)" 
                                    class="w-8 h-8 flex items-center justify-center bg-white rounded-lg shadow-sm active:scale-90 transition-transform">
                                <i class="fas fa-minus text-xs text-gray-400"></i>
                            </button>
                            <span class="font-bold text-[#1a3a5a] text-sm">${quantity}</span>
                            <button onclick="updateQuantity('${p.name}', ${p.price}, 1)" 
                                    class="w-8 h-8 flex items-center justify-center bg-[#1a3a5a] text-white rounded-lg shadow-sm active:scale-90 transition-transform">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function updateQuantity(name, price, delta) {
            const index = cart.findIndex(item => item.name === name);
            if (index > -1) {
                cart[index].quantity += delta;
                if (cart[index].quantity <= 0) cart.splice(index, 1);
            } else if (delta > 0) {
                cart.push({ name, price, quantity: 1 });
            }
            updateCartUI();
            // 直接由記憶體快取重新渲染商品，不走網絡請求，杜絕所有卡頓與重繪動畫
            renderProducts(cachedProducts);
        }

        function updateCartUI() {
            const footer = document.getElementById('cart-footer');
            const totalEl = document.getElementById('cart-total');
            const badgeEl = document.getElementById('cart-count-badge');
            const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            if (cart.length > 0) {
                footer.classList.remove('hidden');
                totalEl.innerText = totalAmount.toLocaleString();
                badgeEl.innerText = totalItems;
            } else {
                footer.classList.add('hidden');
            }
        }

        function toggleCartModal() {
            const modal = document.getElementById('cart-modal');
            const listContainer = document.getElementById('cart-items-list');
            const modalTotal = document.getElementById('modal-total');

            if (modal.classList.contains('hidden')) {
                document.body.style.overflow = 'hidden'; 
                listContainer.innerHTML = cart.map(item => `
                    <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl">
                        <div class="flex-1 text-left">
                            <p class="font-bold text-[#1a3a5a] text-sm">${item.name}</p>
                            <p class="text-[10px] text-gray-400">$${item.price} x ${item.quantity}</p>
                        </div>
                        <p class="font-black text-[#1a3a5a]">$${(item.price * item.quantity).toLocaleString()}</p>
                    </div>
                `).join('');

                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                modalTotal.innerText = total.toLocaleString();
                modal.classList.remove('hidden');
            } else {
                document.body.style.overflow = ''; 
                modal.classList.add('hidden');
            }
        }

        function generateOrderNo() {
            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            let lastDate = localStorage.getItem('lastOrderDate');
            let sequence = parseInt(localStorage.getItem('orderSequence') || '0');

            if (lastDate !== dateStr) {
                sequence = 1;
                localStorage.setItem('lastOrderDate', dateStr);
            } else {
                sequence += 1;
            }
            localStorage.setItem('orderSequence', sequence);
            return `${dateStr}${String(sequence).padStart(4, '0')}`;
        }

        function showCustomNotification(message, confirmCallback, isWarning = false) {
            const dialog = document.createElement('div');
            dialog.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm";
            dialog.innerHTML = `
                <div class="bg-white rounded-3xl p-6 max-w-sm w-[90%] text-center shadow-2xl border border-gray-100">
                    <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full ${isWarning ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'} mb-4">
                        <i class="${isWarning ? 'fas fa-exclamation-triangle text-2xl' : 'fab fa-line text-3xl'}"></i>
                    </div>
                    <h4 class="font-bold text-[#1a3a5a] text-lg mb-2">${isWarning ? '注意' : '訂單已建立！'}</h4>
                    <p class="text-sm text-gray-500 mb-6 leading-relaxed">${message}</p>
                    <button id="custom-dialog-btn" class="w-full ${isWarning ? 'bg-[#1a3a5a]' : 'bg-[#06C755]'} text-white py-3.5 rounded-xl font-bold active:scale-95 transition-transform">
                        ${isWarning ? '我知道了' : '確認並開啟 LINE'}
                    </button>
                </div>
            `;
            document.body.appendChild(dialog);
            document.getElementById('custom-dialog-btn').addEventListener('click', () => {
                document.body.removeChild(dialog);
                if (confirmCallback) confirmCallback();
            });
        }

        function sendToLine() {
            if (cart.length === 0) {
                showCustomNotification("您的購物車還是空的喔！", null, true);
                return;
            }

            const orderNo = generateOrderNo();
            
            let message = `🔖 訂單編號：${orderNo}\n`;
            message += "【生鮮團購｜訂購內容】\n---\n";
            
            cart.forEach(item => {
                message += `▪️ ${item.name} x${item.quantity} ($${(item.price * item.quantity).toLocaleString()})\n`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `---\n💰 總計金額：NT$ ${total.toLocaleString()}\n\n`;
            message += `👉 請在上方搜尋並勾選：「生鮮」傳送訂單！`; 

            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;

            // 使用全新開發的客製化彈窗，取代舊版 alert 警示
            showCustomNotification("請點選「啊桂的頭像」並按下傳送即可送出訂單唷！", () => {
                const tempLink = document.createElement('a');
                tempLink.href = lineUrl;
                tempLink.style.display = 'none';
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
            });
        }

        fetchProducts();
    </script>
</body>
</html>
