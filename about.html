<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.postimg.cc/v8z6rRVj/S-443310086.jpg">
    <title>生鮮團購｜職人嚴選</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f5f2; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { 
            background-color: #D4AF37 !important; 
            color: #1a3a5a !important;            
            font-weight: bold;
            border-radius: 9999px;                
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .item-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-[#1a3a5a]">

    <header class="relative pt-24 pb-28 px-6 text-center overflow-hidden bg-gray-900">
        <img src="https://i.postimg.cc/SxjN3RKF/logofomin.jpg" alt="Background" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="relative z-10 fade-in container mx-auto">
            <h1 class="text-4xl md:text-5xl font-bold tracking-[0.25em] mb-3 text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
                生鮮團購
            </h1>
            <p class="text-xs md:text-sm font-medium tracking-[0.3em] text-white opacity-90 mb-8">FRESH FOOD</p>
            <div class="h-[1.5px] w-16 bg-[#D4AF37] mx-auto mb-8 shadow-lg"></div>
            <p class="max-w-md mx-auto text-base md:text-lg leading-loose font-light text-slate-100 italic tracking-wider">
                「尋遍山海，只為一抹鮮甜。<br>
                <span class="text-white font-normal">將大海的饋贈完整呈獻。</span>」
            </p>
        </div>
        <div class="absolute top-10 -right-5 opacity-10 text-8xl font-bold select-none text-white">FRESH</div>
    </header>

    <nav class="sticky top-0 z-50 bg-[#1a3a5a] border-b border-[#D4AF37]/20 text-white px-4 py-4 shadow-xl">
        <div class="flex space-x-4 overflow-x-auto no-scrollbar whitespace-nowrap text-sm justify-center items-center">
            <a href="index.html" class="px-6 py-2 transition-all duration-300 hover:text-amber-200">
                <i class="fas fa-fish mr-2"></i>蟹老闆壽司區
            </a>
            <a href="about.html" class="px-6 py-2 transition-all duration-300 hover:text-amber-200 active-tab">
                <i class="fas fa-shrimp mr-2"></i>生鮮團購區
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <div class="flex items-center mb-8">
            <h2 class="text-xl font-bold border-l-4 border-[#D4AF37] pl-3">本週嚴選生鮮</h2>
            <span class="ml-auto text-[10px] bg-red-500 text-white px-2 py-1 rounded-full animate-pulse">限量供應</span>
        </div>
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="bg-white py-10 text-center opacity-60 text-[10px] tracking-widest">
        © 2026 蟹老闆 SUSHI | 生鮮團購 FRESH FOOD
    </footer>

    <div id="cart-footer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-md bg-[#1a3a5a] text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between border border-white/10 hidden fade-in">
        <div class="flex items-center space-x-3">
            <div class="relative">
                <i class="fas fa-shopping-basket text-2xl text-[#D4AF37]"></i>
                <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1a3a5a]">0</span>
            </div>
            <div>
                <p class="text-[10px] opacity-60">目前預算累計</p>
                <p class="text-lg font-black">$ <span id="cart-total">0</span></p>
            </div>
        </div>
        <button onclick="sendToLine()" class="bg-[#06C755] hover:bg-[#05b34c] text-white px-6 py-2 rounded-xl font-bold flex items-center space-x-2 transition-all active:scale-95">
            <i class="fab fa-line text-xl"></i>
            <span>傳送訂單</span>
        </button>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTITgLIl15r_SWgqFL4DihsAMIsMqOrZZD6l6GLgXC9orSXQEm-Dh5kHlp1Ee8ZA6FHlMUA1HCUjGII/pub?output=csv";
        let cart = [];

        async function fetchProducts() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const products = rows.filter(row => row.trim() !== '').map((row, index) => {
                    const cols = row.split(',');
                    return {
                        id: index,
                        name: cols[0] ? cols[0].trim() : "未命名",
                        price: cols[1] ? parseInt(cols[1]) : 0,
                        img: cols[2] ? cols[2].trim() : "",
                        spec: cols[3] ? cols[3].trim() : "",
                        about: cols[4] ? cols[4].trim() : ""
                    };
                });
                renderProducts(products);
            } catch (error) {
                console.error("資料讀取失敗:", error);
            }
        }

        function renderProducts(productList) {
    const listContainer = document.getElementById('product-list');
    listContainer.innerHTML = ''; 

    productList.forEach(p => {
        // 查找該品項在購物車中的數量
        const cartItem = cart.find(item => item.name === p.name);
        const quantity = cartItem ? cartItem.quantity : 0;
        const activeClass = quantity > 0 ? "ring-2 ring-[#D4AF37] bg-amber-50" : "bg-white shadow-sm";

        listContainer.innerHTML += `
            <div class="item-card group rounded-2xl p-3 ${activeClass} transition-all">
                <div class="relative overflow-hidden rounded-2xl aspect-square mb-3">
                    <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=圖片載入中'">
                    <div class="absolute top-3 right-3 backdrop-blur-md bg-white/90 text-[#1a3a5a] px-3 py-1.5 rounded-xl shadow-sm ring-1 ring-black/5">
                        <div class="text-sm font-black leading-none">$${p.price}</div>
                    </div>
                </div>
                
                <h3 class="text-base font-bold text-center text-[#1a3a5a] tracking-wide truncate">${p.name}</h3>
                <p class="text-[11px] text-gray-500 text-center mt-1 font-medium truncate">${p.spec}</p>
                
                <div class="mt-4 flex items-center justify-between bg-gray-100 rounded-xl p-1">
                    <button onclick="updateQuantity('${p.name}', ${p.price}, -1)" 
                            class="w-8 h-8 flex items-center justify-center bg-white rounded-lg shadow-sm active:scale-90 transition-transform">
                        <i class="fas fa-minus text-xs text-gray-400"></i>
                    </button>
                    
                    <span class="font-bold text-[#1a3a5a] text-sm">${quantity}</span>
                    
                    <button onclick="updateQuantity('${p.name}', ${p.price}, 1)" 
                            class="w-8 h-8 flex items-center justify-center bg-[#1a3a5a] text-white rounded-lg shadow-sm active:scale-90 transition-transform">
                        <i class="fas fa-plus text-xs"></i>
                    </button>
                </div>
            </div>
        `;
    });
}

// 修改購物車邏輯：從單選改為數量制
function updateQuantity(name, price, delta) {
    const index = cart.findIndex(item => item.name === name);
    
    if (index > -1) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }
    } else if (delta > 0) {
        cart.push({ name, price, quantity: 1 });
    }
    
    updateCartUI();
    fetchProducts(); // 重新渲染畫面以顯示正確數量
}

// 修改 UI 更新顯示總數量
function updateCartUI() {
    const footer = document.getElementById('cart-footer');
    const totalEl = document.getElementById('cart-total');
    const badgeEl = document.getElementById('cart-count-badge');
    
    // 計算總金額與總件數
    const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    
    if (cart.length > 0) {
        footer.classList.remove('hidden');
        totalEl.innerText = totalAmount.toLocaleString();
        badgeEl.innerText = totalItems;
    } else {
        footer.classList.add('hidden');
    }
}

// 修改 LINE 訊息內容
function sendToLine() {
    if (cart.length === 0) return;
    let message = "【生鮮團購訂購單】\n---\n";
    
    cart.forEach(item => {
        message += `▪️ ${item.name} x${item.quantity}\n`;
    });
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    message += `---\n💰 總計金額：NT$ ${total.toLocaleString()}\n\n請確認訂單後回覆告知，謝謝！`;
    
              // 使用您的官方 LINE ID
    const lineUrl = `https://line.me/R/oaMessage/@aaa0770f/?${encodeURIComponent(message)}`;
    window.location.href = lineUrl;

    
}


        
        fetchProducts();
    </script>
</body>
</html>
