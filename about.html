<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蟹老闆｜壽司&生鮮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f5f2; }
        .glass { background: rgba(26, 58, 90, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .item-card:hover img { transform: scale(1.08); }
        .active-tab { border-bottom: 2px solid #8B5E3C; color: #8B5E3C !important; }


            /* 點擊後的顯眼樣式：變成金底黑字，像個發光的標籤 */
        .active-tab { 
            background-color: #D4AF37 !important; /* 職人金 */
            color: #1a3a5a !important;            /* 深藍字 */
            font-weight: bold;
            border-radius: 9999px;                /* 膠囊狀 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* 隱藏捲軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    </style>
</head>
<body class="text-[#1a3a5a]">

    <!-- Header & Hero Section -->
    <!--<header class="bg-[#1a3a5a] text-white pt-16 pb-20 px-6 text-center relative overflow-hidden">-->
<header class="relative pt-24 pb-28 px-6 text-center overflow-hidden bg-gray-900">
  <!-- 背景圖片層 -->
  <img 
    src="https://i.postimg.cc/SxjN3RKF/logofomin.jpg" 
    alt="Brand Background" 
    class="absolute inset-0 w-full h-full object-cover opacity-40"> <!-- 稍微提高透明度讓背景藍黑感更穩 -->

  <div class="relative z-10 fade-in container mx-auto">
    <!-- 主標題：使用純白與細微陰影 -->
    <h1 class="text-4xl md:text-5xl font-bold tracking-[0.25em] mb-3 text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
      嚴選生鮮
    </h1>

    <!-- 英文標題：使用高亮珍珠白，並增加透明度區分層級 -->
    <p class="text-xs md:text-sm font-medium tracking-[0.3em] text-white opacity-90 mb-8">
      SEAFOOD
    </p>

    <!-- 分隔線：改成亮金色，增加職人高級感 -->
    <div class="h-[1.5px] w-16 bg-[#D4AF37] mx-auto mb-8 shadow-lg"></div>

    <!-- 文案：使用明亮的柔白色，字級稍微放大確保易讀性 -->
    <p class="max-w-md mx-auto text-base md:text-lg leading-loose font-light text-slate-100 italic tracking-wider">
      「尋遍山海，只為一抹鮮甜。<br>
      <span class="text-white font-normal">嚴選職人眼中的極致旬味，將大海的饋贈完整呈獻。</span>」
    </p>
  </div>
</header>
        <!-- 裝飾背景文字 -->
        <div class="absolute top-10 -right-5 opacity-10 text-8xl font-bold select-none">SUSHI</div>
    

  <!-- Sticky Navigation -->
        <nav class="sticky top-0 z-50 bg-[#1a3a5a] border-b border-[#D4AF37]/20 text-white px-4 py-4 shadow-xl">
            <div class="flex space-x-4 overflow-x-auto no-scrollbar whitespace-nowrap text-sm justify-center items-center">
                <a href="index.html" class="px-6 py-2 transition-all duration-300 hover:text-amber-200 ">
                    <i class="fas fa-fish mr-2"></i>蟹老闆壽司
                </a>
                
                <a href="about.html" class="px-6 py-2 transition-all duration-300 hover:text-amber-200 active-tab">
                    <i class="fas fa-shrimp mr-2"></i>生鮮區
                </a>
            </div>
        </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <div class="flex items-center mb-8">
            <h2 class="text-xl font-bold border-l-4 border-[#D4AF37] pl-3">本週嚴選生鮮</h2>
            <span class="ml-auto text-[10px] bg-red-500 text-white px-2 py-1 rounded-full animate-pulse">限量供應</span>
        </div>
        
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="bg-white py-10 text-center opacity-60 text-[10px] tracking-widest">
        © 2026 安織生鮮 ALL RIGHTS RESERVED.
    </footer>

    <div id="cart-footer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-md bg-[#1a3a5a] text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between border border-white/10 hidden fade-in">
        <div class="flex items-center space-x-3">
            <div class="relative">
                <i class="fas fa-shopping-basket text-2xl text-[#D4AF37]"></i>
                <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1a3a5a]">0</span>
            </div>
            <div>
                <p class="text-[10px] opacity-60">目前預算累計</p>
                <p class="text-lg font-black">$ <span id="cart-total">0</span></p>
            </div>
        </div>
        <button onclick="sendToLine()" class="bg-[#06C755] hover:bg-[#05b34c] text-white px-6 py-2 rounded-xl font-bold flex items-center space-x-2 transition-all active:scale-95">
            <i class="fab fa-line text-xl"></i>
            <span>傳送訂單</span>
        </button>
    </div>

<script>
    // 1. 設定 Google 試算表 CSV 連結
    // 請確保連結結尾是 output=csv
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTITgLIl15r_SWgqFL4DihsAMIsMqOrZZD6l6GLgXC9orSXQEm-Dh5kHlp1Ee8ZA6FHlMUA1HCUjGII/pub?output=csv";

    let cart = [];

    // 自動從 Google 試算表抓取資料的函式
    async function fetchProducts() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            
            // 將 CSV 文字轉換為 JavaScript 陣列 (排除第一列標題列)
            const rows = data.split('\n').slice(1);
            const products = rows.filter(row => row.trim() !== '').map((row, index) => {
                const cols = row.split(',');
                return {
                    id: index,
                    name: cols[0] ? cols[0].trim() : "未命名商品", // A 欄：名稱
                    price: cols[1] ? parseInt(cols[1]) : 0,        // B 欄：價格
                    img: cols[2] ? cols[2].trim() : "",            // C 欄：圖片網址
                    spec: cols[3] ? cols[3].trim() : ""            // D 欄：商品規格
                };
            });

            renderProducts(products);
        } catch (error) {
            console.error("資料讀取失敗，請檢查試算表是否已發佈到網路且格式為 CSV:", error);
        }
    }

    // 渲染商品到畫面上的函式
    function renderProducts(productList) {
        const listContainer = document.getElementById('product-list');
        if (!listContainer) return;
        
        listContainer.innerHTML = ''; // 清空原本的手動數據

        productList.forEach(p => {
            // 使用乾淨的白色半透明背景顯示價格
            const priceStyle = "bg-white/90 text-[#1a3a5a] ring-1 ring-black/5";
            
            listContainer.innerHTML += `
                <div class="item-card group cursor-pointer" onclick="addToCart('${p.name}', ${p.price})">
                    <div class="relative overflow-hidden rounded-2xl shadow-sm aspect-square mb-3">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://placehold.co/400x400?text=圖片路徑錯誤'">
                        
                        <div class="absolute top-3 right-3 backdrop-blur-md px-3 py-1.5 rounded-xl shadow-sm ${priceStyle}">
                            <div class="text-sm font-black leading-none">$${p.price}</div>
                        </div>
                        
                        <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="bg-white/90 text-[#1a3a5a] text-xs font-bold px-4 py-2 rounded-full shadow-lg">加入購物車</div>
                        </div>
                    </div>
                    
                    <h3 class="text-base font-bold text-center text-[#1a3a5a] group-hover:text-[#D4AF37] transition-colors tracking-wide">
                        ${p.name}
                    </h3>
                    
                    <p class="text-[11px] text-gray-500 text-center mt-1 font-light tracking-wider italic">
                        ${p.spec}
                    </p>
                </div>
            `;
        });
    }

    // 購物車功能：累計金額與顯示
    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
    }

    function updateCartUI() {
        const footer = document.getElementById('cart-footer');
        const totalEl = document.getElementById('cart-total');
        const badgeEl = document.getElementById('cart-count-badge');
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        
        if (cart.length > 0) {
            footer.classList.remove('hidden');
            totalEl.innerText = total.toLocaleString();
            badgeEl.innerText = cart.length;
            
            // 觸發彈跳動畫
            footer.classList.remove('fade-in');
            void footer.offsetWidth; // 強制重繪
            footer.classList.add('fade-in');
        }
    }

    // LINE 訂單發送功能
    function sendToLine() {
        if (cart.length === 0) return;
        
        let message = "【安織生鮮訂購單】\\n---\\n";
        const summary = {};
        
        // 統計相同商品數量
        cart.forEach(item => {
            summary[item.name] = (summary[item.name] || 0) + 1;
        });
        
        for (const [name, qty] of Object.entries(summary)) {
            message += `▪️ ${name} x${qty}\\n`;
        }
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        message += `---\\n💰 總計金額：NT$ ${total.toLocaleString()}\\n\\n請確認訂單後回覆告知，謝謝！`;
        
        // 跳轉至 LINE
        const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
        window.location.href = lineUrl;
    }

    // 初始化：進入頁面立即執行抓取
    fetchProducts();
</script>
    
</body>
</html>
